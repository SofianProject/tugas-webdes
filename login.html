<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk ke EduSpace</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f3f0ff, #e8e2ff);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(93, 63, 211, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-container h2 {
            color: #5d3fd3;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .login-container p {
            color: #777;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #444;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            outline: none;
            font-size: 0.95rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            border-color: #5d3fd3;
        }

        .btn-submit {
            width: 100%;
            background-color: #5d3fd3;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
            display: block;
            text-decoration: none;
        }

        .btn-submit:hover {
            background-color: #4b32b3;
        }

        .footer-links {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #666;
        }

        .footer-links a {
            color: #5d3fd3;
            text-decoration: none;
            font-weight: 600;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>🎓 EduSpace</h2>
        <p>Silakan masuk untuk melanjutkan belajar</p>
        
        <form action="main.html">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Masukkan email kamu" required>
            </div>
            
            <div class="form-group">
                <label for="password">Kata Sandi</label>
                <input type="password" id="password" placeholder="Masukkan kata sandi" required>
            </div>

            <button type="submit" class="btn-submit">Masuk Sekarang</button>
        </form>

        <div class="footer-links">
            <p>Belum punya akun? <a href="#">Daftar disini</a></p>
        </div>
    </div>

</body>
</html>
